<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo G&D Style - Registro</title>
        <link rel="icon" type="image/png" href="img/logo.jpeg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --rosa: #f8b4b4; --rosa-fuerte: #f09494; --oscuro: #333; --verde-wa: #25d366; }
        body { font-family: 'Roboto', sans-serif; background-color: #fff5f5; margin: 0; padding: 20px; color: var(--oscuro); text-align: center; }
        
        .card { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .img-container { position: relative; cursor: zoom-in; overflow: hidden; height: 280px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .img-container:hover .product-img { transform: scale(1.05); }
        .img-hint { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; }

        .content { padding: 25px; }
        h1 { font-family: 'Playfair Display', serif; margin: 0 0 10px; color: var(--oscuro); }
        .description { font-size: 0.95rem; color: #666; margin-bottom: 20px; line-height: 1.4; }
        
        .steps-box { background: #fef0f0; padding: 15px; border-radius: 12px; text-align: left; margin-bottom: 25px; border: 1px dashed var(--rosa-fuerte); }
        .steps-box h3 { margin-top: 0; font-size: 0.9rem; color: var(--rosa-fuerte); text-transform: uppercase; }
        .step { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.85rem; }
        .step i { margin-right: 10px; color: var(--rosa-fuerte); width: 18px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; 
        }

        .btn-verify { 
            background: var(--verde-wa); color: white; border: none; padding: 16px; width: 100%; 
            font-size: 1.1rem; font-weight: bold; border-radius: 10px; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-verify:hover { background: #128c7e; }

        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { max-width: 90%; max-height: 80%; border-radius: 10px; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

        footer { margin-top: 30px; font-size: 0.7rem; color: #bbb; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="img-container" onclick="openModal()">
            <img src="img/sorteo.jpeg" alt="Kit de Sorteo" class="product-img" id="imgSrc">
            <div class="img-hint"><i class="fas fa-search-plus"></i> Ver premios</div>
        </div>
        
        <div class="content">
            <h1>¡Sorteo G&D Style! ✨</h1>
            <p class="description">Participa por nuestro Kit de Cuidado Facial Premium.</p>

            <div class="steps-box">
                <h3>Pasos Obligatorios:</h3>
                <div class="step"><i class="fas fa-plus-circle"></i> Agregar a alguien al grupo de WhatsApp.</div>
                <div class="step"><i class="fas fa-bullhorn"></i> Seguir el canal de WhatsApp.</div>
                <div class="step"><i class="fab fa-instagram"></i> Seguir nuestra cuenta de Instagram.</div>
            </div>

            <div class="form-group">
                <label>Nombre y Apellido</label>
                <input type="text" id="nombreCompleto" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label>Cédula de Identidad</label>
                <input type="number" id="cedula" placeholder="Tu cédula">
            </div>

            <button class="btn-verify" onclick="enviarWhatsApp()">
                <i class="fab fa-whatsapp"></i> PARTICIPAR AHORA
            </button>
            
            <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">
                *Al enviar, adjunta tus 3 capturas en el chat.
            </p>
        </div>
    </div>

    <div id="imgModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="imgFull">
    </div>

    <footer>&copy; 2026 G&D STYLE</footer>

    <script>
        function openModal() {
            const modal = document.getElementById("imgModal");
            const modalImg = document.getElementById("imgFull");
            modal.style.display = "flex";
            modalImg.src = document.getElementById("imgSrc").src;
        }

        function closeModal() {
            document.getElementById("imgModal").style.display = "none";
        }

        function enviarWhatsApp() {
            const nombre = document.getElementById('nombreCompleto').value.trim();
            const id = document.getElementById('cedula').value.trim();
            const numero = "584264744951";

            if(!nombre || !id) {
                alert("Por favor rellena los datos");
                return;
            }

            // Mensaje ultra simplificado para evitar errores de envío
            const texto = "Hola G&D Style! Quiero participar en el sorteo.\n\n" +
                          "Nombre: " + nombre + "\n" +
                          "Cedula: " + id + "\n\n" +
                          "Aqui adjunto las 3 capturas solicitadas.";

            // Usamos encodeURIComponent para que los espacios y saltos de línea funcionen bien
            const url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(texto);
            
            window.open(url, '_blank');
        }
    </script>

</body>
</html>
